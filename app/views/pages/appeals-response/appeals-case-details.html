{% extends "layouts/appeal-layout.html" %}

{% set pageName="Home" %}

{% block beforeContent %}

  <div class="govuk-width-container">
    <a href="javascript:history.back()" class="govuk-back-link">Back</a>
  </div>

{% endblock %}

{% block content %}

<div class="govuk-grid-row">
  <div class="govuk-grid-column-two-thirds">
    <form action="appeals-case-details-summary" method="post" class="govuk-form-group">

      <div class="govuk-form-group">
        <h1 class="govuk-label-wrapper">
          <span class="govuk-caption-l">Appeal response</span>
          <label class="govuk-label govuk-label--l" for="effective-date-detail">
            Decision effective date
          </label>
        </h1>
        <textarea class="govuk-textarea govuk-!-margin-top-5" id="effective-date-detail" name="effective-dateDetail" rows="7"></textarea>
      </div>
    
      <button type="submit" class="govuk-button" data-module="govuk-button">
        Continue
      </button>
    </form>

  </div>
</div>

{% endblock %}
