{% extends "layouts/tl1-layout.html" %}

{% set pageName="Case details" %}

{% block beforeContent %}

  <div class="govuk-width-container">
    <a href="javascript:history.back()" class="govuk-back-link">Back</a>
  </div>

{% endblock %}

{% block content %}

<div class="govuk-grid-row">
  <div class="govuk-grid-column-two-thirds">

    <form action="good-reason" method="post" class="govuk-form-group">

      <div class="govuk-form-group">
        <fieldset class="govuk-fieldset">
          <legend class="govuk-fieldset__legend govuk-fieldset__legend--l">
            <span class="govuk-caption-l">OM1</span>
            <h1 class="govuk-fieldset__heading">
              Who should receive the OM1?
            </h1>
          </legend>
          <div class="govuk-radios" data-module="govuk-radios">
            <div class="govuk-radios__item">
              <input class="govuk-radios__input" id="where-to-send" name="where-to-send" type="radio" value="Appointee">
              <label class="govuk-label govuk-radios__label" for="where-to-send">
                Send to the appointee
              </label>
              <div id="where-to-send-hint" class="govuk-hint govuk-radios__hint">
                Sadie Adler
              </div>
            </div>
            <div class="govuk-radios__item">
              <input class="govuk-radios__input" id="where-to-send-2" name="where-to-send" type="radio" value="Customer">
              <label class="govuk-label govuk-radios__label" for="where-to-send-2">
                Send to the customer
              </label>
              <div id="where-to-send-2-hint" class="govuk-hint govuk-radios__hint">
                Arthur Morgan
              </div>
            </div>
            <div class="govuk-radios__item">
              <input class="govuk-radios__input" id="where-to-send-3" name="where-to-send" type="radio" value="Representative">
              <label class="govuk-label govuk-radios__label" for="where-to-send-3">
                Send to the representative
              </label>
              <div id="where-to-send-3-hint" class="govuk-hint govuk-radios__hint">
                Micah Bell
              </div>
            </div>
          </div>
        </fieldset>
      </div>

      <button type="submit" class="govuk-button govuk-!-margin-top-7" data-module="govuk-button">
        Continue
      </button>
    </form>

  </div>
</div>

{% endblock %}
