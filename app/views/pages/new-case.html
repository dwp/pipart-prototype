{% extends "layouts/main.html" %}

{% set pageName="Case details" %}

{% block beforeContent %}

  <div class="govuk-width-container">
    <a href="javascript:history.back()" class="govuk-back-link">Back</a>
  </div>

{% endblock %}

{% block content %}

<div class="govuk-grid-row">
  <div class="govuk-grid-column-two-thirds">
    <span class="govuk-caption-l">New case</span>
    <h1 class="govuk-heading-l">Search for a customer</h1>

    <form action="case-loading" method="post" class="govuk-form-group">

      <div class="govuk-form-group">
        <label class="govuk-label govuk-!-font-weight-bold" for="nino">
          National Insurance number
        </label>
        <div id="national-insurance-number-hint" class="govuk-hint">
          For example, ‘QQ 12 34 56 C’
        </div>
        <input class="govuk-input govuk-!-width-one-half" id="nino" name="nino" type="text">
      </div>

      <button type="submit" class="govuk-button govuk-!-margin-top-7" data-module="govuk-button">
        Continue
      </button>

    </form>

  </div>
</div>

{% endblock %}
